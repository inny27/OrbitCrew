<style>
:root{--nav-h:70px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#FDF8F0;
  --surf:#FFFFFF;
  --surf2:#F5EDD8;
  --border:rgba(200,149,42,0.18);
  --accent:#C8952A;
  --accent2:#D4708A;
  --accent3:#7A9E7E;
  --green:#7A9E7E;
  --pink:#D4708A;
  --red:#C0392B;
  --text:#3D3248;
  --muted:#9B8E82;
  --r:12px;
  --pixel:'Gowun Batang',serif;
  --gold:#C8952A;
  --gold-lt:#E8B84B;
  --gold-bg:#FFF8E7;
  --gold-bg2:#FFF0CC;
  --rose:#D4708A;
  --rose-lt:#F0A0B8;
  --rose-bg:rgba(212,112,138,0.1);
  --sage:#7A9E7E;
  --sage-bg:rgba(122,158,126,0.1);
  --sky:#7EB8D4;
  --midnight:#2C2340;
  --ink:#3D3248;
  --cream:#FDF8F0;
  --parchment:#F5EDD8;
  --shadow:rgba(44,35,64,0.07);
}
html{height:100%;}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  /* Fix: Changed from overflow:hidden to allow scrolling on long lists/login */
  overflow-y: auto;
  -webkit-font-smoothing: antialiased;
}
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 0%,rgba(200,149,42,0.06),transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(212,112,138,0.05),transparent 60%);
}
.mono{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;}
.muted{color:var(--muted);}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px;position:relative;z-index:1;background:var(--bg);overflow-y:auto;}
.screen.active{display:flex;}
#app{display:none;flex-direction:column;width:100%;min-height:100vh;position:relative;z-index:1;}
#app.active{display:flex;}
.login-title{font-family:var(--pixel);font-size:30px;font-weight:700;color:var(--ink);letter-spacing:-0.3px;margin-top:12px;}
.login-title span{color:var(--gold);}
.login-sub{color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;margin-top:8px;line-height:1.6;}
.auth-card{width:100%;max-width:400px;background:var(--surf);border-radius:24px;padding:28px;border:1px solid var(--border);margin-top:16px;box-shadow:0 8px 32px rgba(44,35,64,0.1);}
.google-btn{width:100%;padding:12px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surf2);color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:11px;font-weight:600;color:var(--muted);}
.field-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surf);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:12px;transition:border-color .2s;}
.big-btn{width:100%;padding:14px 16px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--midnight),#4A3560);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 6px 18px rgba(44,35,64,0.22);}
.auth-error{display:none;background:rgba(239,68,68,.15);border:1px solid var(--red);border-radius:10px;padding:12px;color:var(--red);font-size:13px;font-weight:600;margin-bottom:14px;}
.av-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.av-btn{width:44px;height:44px;border-radius:12px;border:2px solid var(--border);background:var(--surf2);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
.av-btn.sel{border-color:var(--accent);background:rgba(124,58,237,.2);transform:scale(1.1);}
.col-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.col-dot{width:28px;height:28px;border-radius:99px;cursor:pointer;transition:.2s;border:2px solid transparent;}
.col-dot.sel{outline:3px solid #fff;transform:scale(1.2);}
.header{padding:48px 16px 10px;background:rgba(253,248,240,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-avatar{font-size:22px;width:36px;height:36px;border-radius:0;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;background:var(--surf2);box-shadow:2px 2px 0 rgba(0,0,0,.5);}
.hdr-name{font-size:16px;font-weight:700;color:var(--ink);font-family:var(--pixel);}
.hdr-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;color:var(--muted);padding:1px 0;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.sync-pill{display:flex;align-items:center;gap:4px;background:transparent;border:none;padding:0;}
.sync-dot{width:6px;height:6px;border-radius:99px;background:var(--green);}
.sync-text{font-size:10px;font-weight:600;color:var(--muted);}
.sp-pill{font-size:11px;font-weight:600;color:var(--muted);border-radius:4px;padding:3px 8px;background:var(--surf2);border:1px solid var(--border);}
.mult-pill{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:11px;font-weight:900;background:var(--surf);border:1px solid var(--border);border-radius:99px;padding:5px 10px;}
.logout-btn{background:var(--parchment);border:1px solid var(--border);border-radius:10px;width:34px;height:34px;font-size:14px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.2s;}
.xp-row{display:flex;align-items:center;gap:8px;}
.xp-label{font-size:9px;font-weight:800;color:var(--muted);width:18px;}
.xp-bar{flex:1;height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--border);}
.xp-fill{height:100%;border-radius:99px;transition:width .8s ease;position:relative;overflow:hidden;}
.xp-text{font-size:9px;font-weight:800;color:var(--muted);width:60px;text-align:right;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;background:rgba(253,248,240,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:200;min-height:var(--nav-h);}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--muted);padding:4px 10px;border:none;background:transparent;transition:.15s;position:relative;}
.bnav-btn.active{color:var(--accent);}
.bnav-btn.active::before{content:'▲';position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--accent);}
.bnav-icon{font-size:18px;} .bnav-btn img{width:28px;height:28px;image-rendering:pixelated;object-fit:contain;}
.bnav-label{font-size:8px;font-weight:700;font-family:var(--pixel);}
.panel {
  display: none;
  overflow-y: auto;
  padding: 16px 16px calc(16px + var(--bottom-nav-height));
  -webkit-overflow-scrolling: touch;
}
.panel.active { display: block; }
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px;}
.sec-title{font-size:15px;font-weight:700;color:var(--ink);font-family:var(--pixel);}
.add-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surf2);color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pill{padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--surf);font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:.2s;}
.pill.active{background:var(--gold-bg);border-color:var(--gold);color:var(--gold);}
.empty-state{text-align:center;padding:40px 0;color:var(--muted);}
.empty-icon{font-size:40px;opacity:.3;margin-bottom:8px;}
.empty-text{font-size:14px;font-weight:600;}
.icon-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:.15s;}
.progress-card{background:linear-gradient(135deg,var(--gold-bg),var(--gold-bg2));border:1.5px solid rgba(200,149,42,0.22);border-radius:20px;padding:18px 20px;margin-bottom:16px;box-shadow:0 4px 18px rgba(200,149,42,0.1);display:flex;align-items:center;}
.prog-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px;}
.prog-count{font-size:36px;font-weight:800;line-height:1;color:var(--text);}
.prog-total{font-size:20px;color:var(--muted);font-weight:600;}
.prog-bar{height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:8px;}
.prog-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .5s ease;}
.task-card{background:var(--surf);border:1px solid rgba(200,149,42,0.08);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;box-shadow:0 2px 10px var(--shadow);}
.task-card.done{opacity:.5;}
.task-check{width:26px;height:26px;border-radius:99px;border:2px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.task-body{flex:1;min-width:0;}
.task-name{font-size:14px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:700;border:1px solid var(--border);border-radius:99px;padding:2px 8px;color:var(--muted);}
.xp-badge{font-size:11px;font-weight:800;color:var(--accent3);font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;flex-shrink:0;}
.repeat-badge{font-size:10px;font-weight:700;color:#a855f7;border:1px solid rgba(168,85,247,.4);border-radius:99px;padding:2px 7px;}
.mult-card{background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(124,58,237,.1));border:1px solid rgba(245,158,11,.3);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;}
.mult-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.mult-label{font-size:11px;font-weight:800;color:var(--accent3);letter-spacing:1px;}
.mult-val{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:22px;font-weight:900;color:var(--accent3);}
.mult-track{height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
.mult-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,#f59e0b,#ef4444);transition:width .5s;}
.habit-card{background:var(--surf);border:1px solid rgba(200,149,42,0.08);border-radius:18px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px var(--shadow);}
.habit-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.habit-name{font-size:15px;font-weight:800;margin-bottom:3px;}
.habit-meta{font-size:11px;color:var(--muted);font-weight:600;}
.streak-count{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:28px;font-weight:900;color:var(--accent3);line-height:1;}
.days-row{display:flex;gap:5px;margin-bottom:12px;}
.day-dot{flex:1;aspect-ratio:1;border-radius:8px;border:1px solid var(--border);background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--muted);}
.day-dot.done{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.4);}
.day-dot.today{border-color:var(--accent3);color:var(--accent3);}
.done-btn{width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
.no-crew-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:60vh;padding:20px;}
.no-crew-icon{font-size:72px;margin-bottom:16px;}
.no-crew-title{font-size:22px;font-weight:900;margin-bottom:8px;}
.no-crew-sub{color:var(--muted);font-size:14px;font-weight:600;line-height:1.7;margin-bottom:28px;}
.crew-header-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;}
.crew-name-text{font-size:20px;font-weight:900;}
.crew-sub-text{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;}
.leave-btn{background:var(--surf);border:1px solid var(--border);border-radius:99px;padding:7px 14px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}
.season-banner{border:1px solid;border-radius:12px;padding:8px 12px;margin-bottom:12px;text-align:center;}
.lb-wrap{background:var(--surf);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.lb-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);transition:.2s;}
.lb-rank{font-size:16px;width:26px;text-align:center;}
.lb-av{width:40px;height:40px;border-radius:12px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0;background:var(--parchment);}
.lb-name{font-size:14px;font-weight:800;}
.lb-level{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px;}
.boost-mini{width:32px;height:32px;border-radius:99px;border:none;background:linear-gradient(135deg,var(--pink),var(--accent3));font-size:14px;cursor:pointer;transition:.2s;}
.nudge-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.nudge-chip{background:var(--surf);border:1px solid var(--border);border-radius:99px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--text);transition:.2s;}
.chat-box{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:14px;min-height:160px;max-height:260px;overflow-y:auto;margin-bottom:10px;}
.msg-wrap{display:flex;align-items:flex-end;gap:7px;margin-bottom:10px;}
.msg-me{justify-content:flex-end;}
.msg-av{width:28px;height:28px;border-radius:99px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.bubble{max-width:75%;background:var(--surf2);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:3px;padding:10px 12px;font-size:13px;font-weight:600;}
.bubble.me{border-bottom-left-radius:16px;border-bottom-right-radius:3px;border:none;color:#fff;}
.bubble-sender{font-size:9px;font-weight:800;color:var(--accent2);margin-bottom:3px;letter-spacing:.5px;}
.msg-input-row{display:flex;gap:8px;}
.msg-input{flex:1;background:var(--surf);border:1px solid var(--border);border-radius:99px;padding:12px 18px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:.2s;}
.send-btn{width:44px;height:44px;border-radius:99px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:16px;cursor:pointer;}
.boss-card{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;}
.boss-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.boss-name-text{font-size:14px;font-weight:900;}
.boss-hp-num{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:18px;font-weight:900;margin-left:auto;}
.boss-bar-wrap{height:10px;background:var(--border);border-radius:99px;overflow:hidden;}
.boss-bar-fill{height:100%;border-radius:99px;transition:width .5s;}
.stats-row{display:flex;gap:10px;margin-bottom:20px;}
.stat-card{flex:1;background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-lbl{font-size:10px;font-weight:600;color:var(--muted);}
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.badge-card{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:14px 10px;text-align:center;transition:.2s;}
.badge-card.earned{border-color:var(--accent3);background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(124,58,237,.08));}
.badge-icon{font-size:30px;margin-bottom:6px;}
.badge-name{font-size:11px;font-weight:800;color:var(--muted);}
.badge-desc{font-size:9px;color:var(--border);font-weight:600;}
.skill-tree-wrap{margin-bottom:24px;}
.skill-box{width:100%;background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:14px;transition:.2s;margin-bottom:4px;}
.skill-box-name{font-size:14px;font-weight:800;margin-bottom:4px;}
.skill-box-desc{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px;}
.sp-info{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);border-radius:12px;padding:12px;font-size:13px;font-weight:600;text-align:center;margin-bottom:16px;}
.fit-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;}
.fit-tab{padding:8px 12px;border-radius:99px;border:1.5px solid transparent;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);white-space:nowrap;transition:.2s;}
.fit-tab.active{background:var(--gold-bg);border-color:rgba(200,149,42,0.3);color:var(--gold);}
.body-stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.body-stat-card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}

const EXERCISE_DB = [{id:'bench_press',name:'Bench Press',muscles:['Chest','Triceps','Shoulders'],type:'weights',difficulty:2,category:'compound',desc:'Lie flat on bench, grip bar slightly wider than shoulders, lower to chest, press up explosively.',tips:'Retract shoulder blades, feet flat.',cues:'Squeeze the bar.'},{id:'pushup',name:'Push Up',muscles:['Chest','Triceps','Shoulders','Core'],type:'calisthenics',difficulty:1,category:'compound',desc:'Hands shoulder-width apart, body straight, lower chest to floor and push up.',tips:'Keep core tight.',cues:'Screw hands into floor.'},{id:'pullup',name:'Pull Up',muscles:['Back','Biceps','Core'],type:'calisthenics',difficulty:3,category:'compound',desc:'Hang from bar with overhand grip, pull chest to bar, lower with full control.',tips:'Full dead hang at bottom.',cues:'Elbows to back pockets.'},{id:'squat',name:'Back Squat',muscles:['Quads','Glutes','Hamstrings','Core'],type:'weights',difficulty:3,category:'compound',desc:'Bar on traps, squat to parallel or below, knees track over toes, drive up.',tips:'Chest stays up.',cues:'Push the floor away.'},{id:'plank',name:'Plank',muscles:['Core','Shoulders','Glutes'],type:'calisthenics',difficulty:1,category:'isolation',desc:'Forearms on floor, body straight, hold position.',tips:'Breathe steadily.',cues:'Squeeze everything.'},{id:'deadlift',name:'Deadlift',muscles:['Back','Glutes','Hamstrings','Core'],type:'weights',difficulty:3,category:'compound',desc:'Hip-width stance, hinge to grip bar, drive through floor keeping back flat.',tips:'Brace core.',cues:'Push the ground.'}];
const WORKOUT_GUIDES = [{id:'ppl',name:'Push Pull Legs',icon:'🏋️',type:'weights',level:'Intermediate',days:6,desc:'Classic split.',exercises:['Bench Press','Overhead Press','Tricep Pushdown','Pull Up','Bent Over Row','Bicep Curl','Back Squat','Romanian Deadlift']}];


let currentUser = null, userProfile = null;
let tasks = [], habits = [], crew = null, crewMembers = [], crewMessages = [], boss = null;
let bodyEntries = [], workoutEntries = [], fitnessProfile = null;
let unsubs = [], activeTab = 'today', synced = false;
let _authHandled = false; 


function lsKey(key) { return key + '_' + (currentUser ? currentUser.uid : 'anon'); }
function lsGet(key, def) {
  const v = localStorage.getItem(lsKey(key));
  if (v !== null) return v;
  return def !== undefined ? def : null;
}
function lsSet(key, value) { localStorage.setItem(lsKey(key), String(value)); }
let timerSecs = 0, timerRunning = false, timerInterval = null;
let restSecs = 0, restInterval = null;
let activeSession = null;
let selAvatar = '100100', selColor = '#7c3aed';
let taskType = 'personal', taskPriority = 'medium', taskRepeat = 'none';
let habitTime = 'morning';
let selEx = null, exQuery = '', currentSets = [{reps:8,weight:'',duration:30,mode:'reps'}], currentFeel = 'good', setMode = 'reps';
let streakMult = 1;


onAuthStateChanged(auth, async user => {
  if (_authHandled) return;
  if (user) {
    currentUser = user;
    await loadProfile(currentUser.uid);
  } else {
    unsubs.forEach(u => u()); unsubs = [];
    currentUser = null; userProfile = null;
    showScreen('login');
  }
});


async function loadProfile(uid) {
  const snap = await getDoc(doc(db,'users',uid));
  if (snap.exists()) {
    userProfile = snap.data();
    subscribeAll(uid, userProfile.crewId);
    loadFitness(uid);
    showApp();
  } else {
    showScreen('profile-setup');
  }
}


function subscribeAll(uid, crewId) {
  unsubs.forEach(u => u()); unsubs = [];
  
  unsubs.push(onSnapshot(doc(db,'users',uid), s => {
    if (s.exists()) {
      userProfile = s.data();
      renderHeader(); renderAwards(); updateBg(); synced = true; renderSyncDot();
    }
  }));


  /* Restored Task Visibility Logic */
  unsubs.push(onSnapshot(query(collection(db,'tasks'), where('uid','==',uid)), s => {
    let myTasksMap = new Map();
    s.docs.forEach(d => myTasksMap.set(d.id, {id:d.id, ...d.data()}));


    if (crewId) {
      const sharedQuery = query(collection(db, 'tasks'), where('crewId', '==', crewId), where('owner', '==', 'both'));
      getDocs(sharedQuery).then(sharedSnap => {
        sharedSnap.docs.forEach(d => {
          if (!myTasksMap.has(d.id)) myTasksMap.set(d.id, {id: d.id, ...d.data()});
        });
        tasks = Array.from(myTasksMap.values());
        renderToday();
      });
    } else {
      tasks = Array.from(myTasksMap.values());
      renderToday();
    }
  }));


  unsubs.push(onSnapshot(query(collection(db,'habits'),where('uid','==',uid)), s => {
    habits = s.docs.map(d => ({id:d.id,...d.data()})); renderHabits();
  }));


  if (crewId) subscribeCrew(crewId);
}


function subscribeCrew(crewId) {
  unsubs.push(onSnapshot(doc(db,'crews',crewId), s => { if(s.exists()){crew={id:s.id,...s.data()};renderCrew();} }));
  unsubs.push(onSnapshot(query(collection(db,'users'),where('crewId','==',crewId)), s => { crewMembers=s.docs.map(d=>({id:d.id,...d.data()}));renderCrew(); }));
  unsubs.push(onSnapshot(query(collection(db,'crews',crewId,'messages'),orderBy('createdAt','asc')), s => { crewMessages=s.docs.map(d=>({id:d.id,...d.data()}));renderMessages(); }));
  unsubs.push(onSnapshot(doc(db,'crews',crewId,'boss','current'), s => { if(s.exists()){boss=s.data();renderBoss();} }));
}


async function loadFitness(uid) {
  const snap = await getDoc(doc(db,'fitness',uid));
  if (snap.exists()) {
    fitnessProfile = snap.data();
    bodyEntries = fitnessProfile.bodyEntries || [];
    workoutEntries = fitnessProfile.workoutEntries || [];
  }
}


async function saveFitness() {
  if (!currentUser) return;
  const data = { optedIn:true, ...(fitnessProfile||{}), bodyEntries, workoutEntries, updatedAt:serverTimestamp() };
  await setDoc(doc(db,'fitness',currentUser.uid), data, {merge:true});
}


// ─── TASK LOGIC ───────────────────────────────────────────
window.addTask = async () => {
  const name = g('new-task-name').value.trim(); 
  if (!name) { toast('Name your mission!'); return; }
  const deadline = g('task-deadline')?.value || null;
  const isShared = g('task-shared')?.checked || false;


  try {
    await addDoc(collection(db, 'tasks'), {
      name,
      type: taskType,
      priority: taskPriority,
      repeat: taskRepeat,
      deadline,
      shared: isShared,
      uid: currentUser.uid,
      owner: (taskType === 'shared' || taskType === 'chore' || isShared) ? 'both' : currentUser.uid,
      crewId: userProfile.crewId || null,
      xp: XP[taskPriority] || XP.medium,
      done: false,
      createdAt: serverTimestamp(),
      sortOrder: Date.now()
    });
    closeModal('task-modal');
    g('new-task-name').value = '';
    toast('✅ Task added!');
  } catch (e) {
    toast('❌ Failed to save task');
  }
};


window.completeTask = async id => {
  const t = tasks.find(x => x.id === id); if (!t || t.done) return;
  await updateDoc(doc(db,'tasks',id), {done:true, doneAt:serverTimestamp()});
  missionCel(t.name, t.xp||30); gainXP(t.xp||30);
};


window.openTaskEdit = async (id) => {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const newName = prompt("Edit Task Name:", t.name);
  if (newName && newName.trim() !== t.name) {
    await updateDoc(doc(db, 'tasks', id), { name: newName.trim() });
    toast("✅ Task updated!");
  }
};


async function reorderTasks(draggedId, overId) {
  const draggedTask = tasks.find(t => t.id === draggedId);
  const overTask = tasks.find(t => t.id === overId);
  if (!draggedTask || !overTask) return;
  const tempOrder = draggedTask.sortOrder || Date.now();
  await updateDoc(doc(db, 'tasks', draggedId), { sortOrder: overTask.sortOrder || Date.now() });
  await updateDoc(doc(db, 'tasks', overId), { sortOrder: tempOrder });
}


// ─── MUSIC PLAYER LOGIC ───────────────────────────────────
const SONG_FILES = {
  'Floral Life': 'https://inny27.github.io/OrbitCrew/01.%20Floral%20Life%20-%20Henesys.mp3',
  'Above the Treetops': 'https://inny27.github.io/OrbitCrew/12.%20Above%20the%20Treetops%20-%20Lith%20Harbour.mp3',
  'Missing You': 'https://inny27.github.io/OrbitCrew/15.%20Missing%20You%20-%20Ellinia.mp3',
  'Title Screen': 'https://inny27.github.io/OrbitCrew/123.%20Title%20-%20Login.mp3'
};
const MUSIC_TRACKS = [
  {id:'floral_life',title:'Floral Life',artist:'Henesys',mob:'130100',colour:'#9bbc0f',url:SONG_FILES['Floral Life']},
  {id:'above_the_treetops',title:'Above the Treetops',artist:'Lith Harbour',mob:'130101',colour:'#7EB8D4',url:SONG_FILES['Above the Treetops']},
  {id:'missing_you',title:'Missing You',artist:'Ellinia',mob:'120100',colour:'#D4708A',url:SONG_FILES['Missing You']},
  {id:'title_screen',title:'Title Screen',artist:'Login',mob:'100100',colour:'#C8952A',url:SONG_FILES['Title Screen']}
];


let _mpTrackIdx = 0, _mpAudio = null, _mpPlaying = false, _mpShuffle = false, _mpRepeat = 'none', _mpVolume = 0.7, _mpProgress = 0, _mpDuration = 0, _mpProgressInterval = null, _mpTab = 'all';
let _mpLiked = new Set(JSON.parse(localStorage.getItem('mp_liked') || '[]'));
let _mpAlbums = JSON.parse(localStorage.getItem('mp_albums') || '{"In-Built Songs": ["floral_life", "above_the_treetops", "missing_you", "title_screen"]}');


function _mpFmt(s) { if (!s || isNaN(s)) return '0:00'; return Math.floor(s/60) + ':' + Math.floor(s%60).toString().padStart(2,'0'); }
function _mpGetTrack() { return MUSIC_TRACKS[_mpTrackIdx] || MUSIC_TRACKS[0]; }
function _mpGetList() { return (_mpTab === 'liked') ? MUSIC_TRACKS.filter(t => _mpLiked.has(t.id)) : MUSIC_TRACKS; }


window.renderMusicPlayer = function() { _mpBuildUI(); };


function _mpBuildUI() {
  const root = document.getElementById('music-app-root');
  if (!root) return;
  const t = _mpGetTrack();
  const pct = _mpDuration > 0 ? Math.min((_mpProgress / _mpDuration) * 100, 100) : 0;
  const isLiked = _mpLiked.has(t.id);
  const searchVal = root._searchVal || '';
  const list = _mpGetList().filter(tr => !searchVal || tr.title.toLowerCase().includes(searchVal.toLowerCase()));


  root.innerHTML =
    '<div style="display:flex;flex-direction:column;height:calc(100vh - 155px)">' +
    '<div style="background:linear-gradient(135deg,' + t.colour + '18,' + t.colour + '06);padding:12px 16px;border-bottom:1px solid var(--border)">' +
      '<div style="display:flex;align-items:center;gap:12px">' +
        '<div style="width:52px;height:52px;border-radius:12px;background:' + t.colour + '20;display:flex;align-items:center;justify-content:center">' +
          '<img src="https://maplestory.io/api/GMS/255/mob/' + t.mob + '/render/stand" width="44" style="image-rendering:pixelated">' +
        '</div>' +
        '<div style="flex:1"><strong>' + t.title + '</strong><div style="font-size:11px">' + t.artist + '</div></div>' +
        '<button onclick="_mpToggleLike()" style="background:none;border:none;font-size:20px;color:' + (isLiked?'#D4708A':'var(--muted)') + '">' + (isLiked?'♥':'♡') + '</button>' +
      '</div>' +
      '<div style="height:4px;background:var(--parchment);margin:10px 0;position:relative;overflow:hidden;border-radius:99px">' +
        '<div style="width:' + pct + '%;height:100%;background:' + t.colour + '"></div>' +
      '</div>' +
      /* Clean Controls Block */
      '<div style="display:flex;justify-content:center;gap:10px">' +
        '<button onclick="_mpToggleShuffle()" style="opacity:' + (_mpShuffle?1:0.4) + '">⇄</button>' +
        '<button onclick="_mpPrev()">⏮</button>' +
        '<button onclick="_mpTogglePlay()" style="font-size:24px">' + (_mpPlaying?'⏸':'▶') + '</button>' +
        '<button onclick="_mpNext()">⏭</button>' +
        '<button onclick="_mpCycleRepeat()">' + (_mpRepeat==='one'?'🔂':'🔁') + '</button>' +
        '<button onclick="mpOpenAddToAlbum(\'In-Built Songs\')">+</button>' +
      '</div>' +
    '</div>' +
    '<div style="display:flex;padding:8px;gap:10px;border-bottom:1px solid var(--border)">' +
      '<button onclick="_mpSetTab(\'all\')">All</button><button onclick="_mpSetTab(\'liked\')">Liked</button><input id="mp-search" placeholder="Search..." oninput="this.parentNode.parentNode._searchVal=this.value;window.renderMusicPlayer()">' +
    '</div>' +
    '<div style="flex:1;overflow-y:auto;padding:10px">' +
      list.map(tr => `<div onclick="_mpPlay(${MUSIC_TRACKS.indexOf(tr)})" style="padding:8px;border-bottom:1px solid var(--border)">${tr.title}</div>`).join('') +
    '</div>' +
    '</div>';
}


window._mpPlay = (idx) => {
  _mpTrackIdx = idx;
  if(_mpAudio) _mpAudio.pause();
  _mpAudio = new Audio(MUSIC_TRACKS[idx].url);
  _mpAudio.volume = _mpVolume;
  _mpAudio.play();
  _mpPlaying = true;
  _mpProgressInterval = setInterval(() => {
    if(_mpAudio) { _mpProgress = _mpAudio.currentTime; _mpDuration = _mpAudio.duration; _mpBuildUI(); }
  }, 1000);
};
window._mpTogglePlay = () => { if(_mpPlaying) _mpAudio.pause(); else _mpAudio.play(); _mpPlaying = !_mpPlaying; _mpBuildUI(); };
window._mpNext = () => window._mpPlay((_mpTrackIdx+1)%MUSIC_TRACKS.length);
window._mpPrev = () => window._mpPlay((_mpTrackIdx-1+MUSIC_TRACKS.length)%MUSIC_TRACKS.length);


// ─── BOILERPLATE HELPERS ──────────────────────────────────
function g(id){return document.getElementById(id);}
function toast(m){const t=g('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));g(id).classList.add('active');}
function showApp(){showScreen('app'); g('app').classList.add('active'); renderToday();}
function closeModal(id){g(id).classList.remove('open');}
function openModal(id){g(id).classList.add('open');}
window.switchTab = t => {
  activeTab = t;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  g('panel-'+t).classList.add('active');
  if(t==='today') renderToday();
  if(t==='habits') renderHabits();
  if(t==='fitness') renderFitness();
  if(t==='music') renderMusicPlayer();
};


// ─── TASK INTERACTION ─────────────────────────────────────
let dragId = null;
document.addEventListener('dragstart', e => { dragId = e.target.closest('.task-card')?.dataset.id; });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  const overId = e.target.closest('.task-card')?.dataset.id;
  if(dragId && overId && dragId !== overId) reorderTasks(dragId, overId);
});


let holdTimer = null;
window.startTaskHold = (e, id) => { holdTimer = setTimeout(() => window.openTaskEdit(id), 500); };
window.endTaskHold = () => clearTimeout(holdTimer);


</script>

    <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
  </div>
  <div class="panels">
    <div class="panel active" id="panel-today">
      <div class="progress-card">
        <div style="flex:1"><span class="prog-count" id="prog-count">0</span><span class="prog-total" id="prog-total">/0</span><div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div></div>

</div>

  </div>
</div>


<div id="toast"></div>


<script>
// Bridge
function addTask(){if(window.addTask)window.addTask.apply(window,arguments);}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openModal(id){document.getElementById(id).classList.add('open');}
function switchTab(t){if(window.switchTab)window.switchTab(t);}
</script>
